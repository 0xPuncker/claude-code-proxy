services:
  # Claude Code Proxy
  cc-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROXY_CONTAINER_NAME:-cc-proxy}
    ports:
      - "${PROXY_PORT:-4181}:4181"
    env_file:
      - .env
    environment:
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-18000000}
      - API_STREAMING_TIMEOUT_MS=${API_STREAMING_TIMEOUT_MS:-18000000}
      - API_MAX_RETRIES=${API_MAX_RETRIES:-5}
      - API_RETRY_DELAY_MS=${API_RETRY_DELAY_MS:-2000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
      - CLAUDE_CREDENTIALS_PATH=/app/credentials.json
    volumes:
      - ${USERPROFILE}/.claude/.credentials.json:/app/credentials.json:rw
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${PROXY_PORT:-4181}/health || exit 1",
        ]
      interval: ${PROXY_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${PROXY_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${PROXY_HEALTHCHECK_RETRIES:-3}
      start_period: ${PROXY_HEALTHCHECK_START_PERIOD:-10s}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "claude.ai:160.79.104.10"
      - "api.claude.ai:160.79.104.10"
    depends_on:
      cc-db:
        condition: service_healthy
    restart: "no"
    networks:
      - claude-network

  # PostgreSQL Database
  cc-db:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: ${DB_CONTAINER_NAME:-cc-db}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-claude_proxy}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

  # Adminer (Database Management UI)
  cc-adminer:
    image: adminer:${ADMINER_VERSION:-latest}
    container_name: ${ADMINER_CONTAINER_NAME:-cc-adminer}
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER:-cc-db}
      - ADMINER_DESIGN=${ADMINER_DESIGN:-nette}
    depends_on:
      cc-db:
        condition: service_healthy
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

volumes:
  postgres_data:
    driver: local

networks:
  claude-network:
    driver: bridge
