version: '3.8'

services:
  claude-code-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code-proxy
    ports:
      - "4181:4181"
    environment:
      - PROXY_PORT=${PROXY_PORT:-4181}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4181/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - claude-network

networks:
  claude-network:
    driver: bridge
