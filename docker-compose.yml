services:
  # Claude Code Proxy
  cc-proxy:
    container_name: cc-proxy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PROXY_PORT:-4181}:4181"
    env_file:
      - ${PROXY_ENV_FILE:-.env.docker}
    environment:
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-18000000}
      - API_STREAMING_TIMEOUT_MS=${API_STREAMING_TIMEOUT_MS:-18000000}
      - API_MAX_RETRIES=${API_MAX_RETRIES:-5}
      - API_RETRY_DELAY_MS=${API_RETRY_DELAY_MS:-2000}
      - NODE_ENV=${NODE_ENV:-production}
      - CLAUDE_CREDENTIALS_PATH=/app/credentials.json
      # Long-lived token from `claude setup-token` (takes precedence over the mounted file)
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-cc-db}:5432/${POSTGRES_DB:-claude_proxy}
    volumes:
      - ~/.claude/claude-credentials.json:/app/credentials.json:rw
    healthcheck:
      test:
        [
          "CMD-SHELL",
              "wget -qO- http://127.0.0.1:4181/health || exit 1",
        ]
      interval: ${PROXY_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${PROXY_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${PROXY_HEALTHCHECK_RETRIES:-3}
      start_period: ${PROXY_HEALTHCHECK_START_PERIOD:-10s}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      cc-db:
        condition: service_healthy
    restart: "no"
    networks:
      - claude-network

  # PostgreSQL Database
  cc-db:
    container_name: cc-db
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-claude_proxy}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

  # Adminer (Database Management UI)
  cc-adminer:
    container_name: cc-adminer
    image: adminer:${ADMINER_VERSION:-latest}
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER:-cc-db}
      - ADMINER_DESIGN=${ADMINER_DESIGN:-nette}
    depends_on:
      cc-db:
        condition: service_healthy
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

volumes:
  postgres_data:
    driver: local

networks:
  claude-network:
    driver: bridge
