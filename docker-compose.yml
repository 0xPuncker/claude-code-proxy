services:
  # Claude Code Proxy
  cc-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROXY_CONTAINER_NAME:-cc-proxy}
    ports:
      - "${PROXY_PORT:-4181}:4181"
    environment:
      - PROXY_PORT=${PROXY_PORT:-4181}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-cc-db}:${DB_PORT:-5432}/${POSTGRES_DB:-claude_proxy}
      - DB_HOST=${DB_HOST:-cc-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${POSTGRES_DB:-claude_proxy}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_SSL=${DB_SSL:-false}
      - DB_MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-10}
      - DB_IDLE_TIMEOUT_MS=${DB_IDLE_TIMEOUT_MS:-30000}
      - DB_CONNECTION_TIMEOUT_MS=${DB_CONNECTION_TIMEOUT_MS:-2000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      cc-db:
        condition: service_healthy
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

  # PostgreSQL Database
  cc-db:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: ${DB_CONTAINER_NAME:-cc-db}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-claude_proxy}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

  # Adminer (Database Management UI)
  cc-adminer:
    image: adminer:${ADMINER_VERSION:-latest}
    container_name: ${ADMINER_CONTAINER_NAME:-cc-adminer}
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER:-cc-db}
      - ADMINER_DESIGN=${ADMINER_DESIGN:-nette}
    depends_on:
      cc-db:
        condition: service_healthy
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - claude-network

volumes:
  postgres_data:
    driver: local

networks:
  claude-network:
    driver: bridge
